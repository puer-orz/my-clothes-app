<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Neon Glow Filters -->
    <filter id="neon-glow-pink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur5"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur10"/>
      <feMerge>
        <feMergeNode in="blur10"/>
        <feMergeNode in="blur5"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neon-glow-blue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur5"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur10"/>
      <feMerge>
        <feMergeNode in="blur10"/>
        <feMergeNode in="blur5"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="liquid-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff00ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00ffff" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Glass Shape -->
  <path d="M50 40 L150 40 L120 130 C115 145 105 150 100 150 C95 150 85 145 80 130 L50 40 Z" 
        stroke="#00ffff" stroke-width="3" fill="none" filter="url(#neon-glow-blue)" opacity="0.9"/>
  
  <!-- Liquid inside -->
  <path d="M60 60 L140 60 L115 125 C112 135 105 138 100 138 C95 138 88 135 85 125 L60 60 Z" 
        fill="url(#liquid-gradient)" filter="url(#neon-glow-pink)" opacity="0.8"/>
        
  <!-- Stem and Base -->
  <path d="M100 150 L100 180 M70 180 L130 180" 
        stroke="#00ffff" stroke-width="3" stroke-linecap="round" filter="url(#neon-glow-blue)"/>
        
  <!-- Bubbles -->
  <circle cx="90" cy="100" r="3" fill="#ffffff" opacity="0.8">
    <animate attributeName="cy" from="120" to="60" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="110" cy="90" r="2" fill="#ffffff" opacity="0.6">
    <animate attributeName="cy" from="120" to="60" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Straw or Garnish -->
  <path d="M140 30 L120 60" stroke="#ff00ff" stroke-width="4" stroke-linecap="round" filter="url(#neon-glow-pink)"/>
</svg>